services:
  localstack:
    image: localstack/localstack:3
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3,kinesis,dynamodb
      DEFAULT_REGION: us-east-1
      LOCALSTACK_AUTH_TOKEN: ""
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  localstack-init:
      image: amazon/aws-cli:2.17.0
      environment:
        AWS_ACCESS_KEY_ID: test
        AWS_SECRET_ACCESS_KEY: test
        AWS_DEFAULT_REGION: us-east-1
      entrypoint:
        - /bin/sh
        - -c
        - |
          aws --endpoint-url http://localstack:4566 s3 mb s3://text2sql-failed-sql --region us-east-1 || true
          aws --endpoint-url http://localstack:4566 dynamodb create-table --table-name query_results --attribute-definitions AttributeName=query_id,AttributeType=S --key-schema AttributeName=query_id,KeyType=HASH --billing-mode PAY_PER_REQUEST --region us-east-1 || true
          aws --endpoint-url http://localstack:4566 dynamodb update-time-to-live --table-name query_results --time-to-live-specification Enabled=true,AttributeName=expires_at --region us-east-1 || true
          aws --endpoint-url http://localstack:4566 kinesis create-stream --stream-name text2sql-queries --shard-count 1 --region us-east-1 || true
      depends_on:
        localstack:
          condition: service_healthy

  fake-sagemaker:
    image: python:3.11-slim
    command: >
      sh -c "pip install flask -q && python /fake_sagemaker.py"
    volumes:
      - ./scripts/fake_sagemaker.py:/fake_sagemaker.py
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/ping', timeout=2)"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s

  lambda:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./src:/var/task/src
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
      AWS_ENDPOINT_URL: http://localstack:4566
      SAGEMAKER_RUNTIME_ENDPOINT_URL: http://fake-sagemaker:8080
      DYNAMODB_TABLE: query_results
      FAILED_SQL_BUCKET: text2sql-failed-sql
      SAGEMAKER_ENDPOINT_NAME: text2sql-inference
      PUSHGATEWAY_URL: http://pushgateway:9091
    depends_on:
      localstack:
        condition: service_healthy
      localstack-init:
        condition: service_completed_successfully
      fake-sagemaker:
        condition: service_healthy

networks:
  default:
    name: text2sql-net
