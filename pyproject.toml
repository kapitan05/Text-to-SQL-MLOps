[tool.ruff]
line-length = 88
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "ANN"]
ignore = []

[tool.ruff.lint.flake8-annotations]
# `**kwargs: Any` is the standard Airflow BaseOperator signature
allow-star-arg-any = true

[tool.mypy]
python_version = "3.11"
strict = true
ignore_missing_imports = true
