repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: no-commit-to-branch
        args: [--branch, main]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.16.0
    hooks:
      - id: mypy
        name: mypy (app)
        files: ^app/src/
        additional_dependencies:
          - pydantic>=2.8.0
          - boto3-stubs[dynamodb,s3]>=1.35.0
          - tenacity>=8.5.0
          - types-boto3
      - id: mypy
        name: mypy (ml)
        # training/ excluded: deep GPU framework deps (torch, transformers, trl, peft)
        # can't be stub-checked without the full ML venv; use `make -C ml typecheck` instead
        files: ^ml/(data|modeling|export)/
        additional_dependencies:
          - pydantic>=2.8.0
          - pydantic-settings>=2.4.0
          - tenacity>=8.5.0
          - pyyaml>=6.0.2
          - types-pyyaml

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]
        exclude: uv\.lock|\.env|\.terraform

  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.99.4
    hooks:
      - id: terraform_fmt
        args: [--args=-recursive]
        files: \.(tf|tfvars)$
