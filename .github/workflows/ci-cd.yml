name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  LAMBDA_REPO: text2sql-inference
  SAGEMAKER_REPO: text2sql-sagemaker

permissions:
  id-token: write
  contents: read

jobs:

  # ── CI: Test Application ────────────────────────────────────────────────────
  test:
    name: Test Application
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync
        working-directory: app

      - name: Lint & type-check
        run: make -C app lint typecheck

      - name: Unit tests
        run: uv run pytest tests/ -v --ignore=tests/integration
        working-directory: app

      - name: Start LocalStack
        run: docker compose up localstack localstack-init -d
        working-directory: app

      - name: Wait for LocalStack
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:4566/_localstack/health \
              | grep -q '"kinesis": "running"' && echo "LocalStack ready" && exit 0
            sleep 2
          done
          echo "LocalStack failed to start" && exit 1

      - name: Integration tests
        run: uv run pytest tests/integration/ -v -m integration
        working-directory: app

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: terraform init -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}"
        working-directory: infra

      - name: Terraform validate
        run: terraform validate
        working-directory: infra

      - name: Get AWS account ID
        id: identity
        run: |
          echo "account_id=$(aws sts get-caller-identity --query Account --output text)" \
            >> $GITHUB_OUTPUT

      - name: Terraform plan
        run: |
          ACCT=${{ steps.identity.outputs.account_id }}
          terraform plan \
            -var="ecr_image_uri=${ACCT}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.LAMBDA_REPO }}:latest" \
            -var="sagemaker_image_uri=${ACCT}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.SAGEMAKER_REPO }}:latest" \
            -var="grafana_password=${{ secrets.GRAFANA_PASSWORD }}"
        working-directory: infra

  # ── CD: Build and Push ──────────────────────────────────────────────────────
  build-push:
    name: Build and Push
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      account_id: ${{ steps.identity.outputs.account_id }}
      image_tag: ${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get AWS account ID
        id: identity
        run: |
          echo "account_id=$(aws sts get-caller-identity --query Account --output text)" \
            >> $GITHUB_OUTPUT

      - name: Ensure ECR repositories exist
        run: |
          aws ecr create-repository --repository-name ${{ env.LAMBDA_REPO }}    || true
          aws ecr create-repository --repository-name ${{ env.SAGEMAKER_REPO }} || true

      - name: Log in to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Lambda (linux/arm64) ────────────────────────────────────────────────
      - name: Build & push Lambda image
        uses: docker/build-push-action@v6
        with:
          context: app
          file: app/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ steps.identity.outputs.account_id }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.LAMBDA_REPO }}:${{ github.sha }}
            ${{ steps.identity.outputs.account_id }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.LAMBDA_REPO }}:latest
          cache-from: type=gha,scope=lambda
          cache-to: type=gha,scope=lambda,mode=max

      # ── SageMaker (linux/amd64) ─────────────────────────────────────────────
      - name: Restore GGUF model from cache
        id: cache-gguf
        uses: actions/cache@v4
        with:
          path: models/model_q4_k_m.gguf
          key: gguf-${{ secrets.GGUF_MODEL_VERSION }}

      - name: Download GGUF model from S3
        if: steps.cache-gguf.outputs.cache-hit != 'true'
        run: |
          mkdir -p models
          aws s3 cp ${{ secrets.GGUF_MODEL_S3_URI }} models/model_q4_k_m.gguf

      - name: Build & push SageMaker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: sagemaker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.identity.outputs.account_id }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.SAGEMAKER_REPO }}:${{ github.sha }}
            ${{ steps.identity.outputs.account_id }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.SAGEMAKER_REPO }}:latest
          cache-from: type=gha,scope=sagemaker
          cache-to: type=gha,scope=sagemaker,mode=max

  # ── CD: Define Infrastructure ───────────────────────────────────────────────
  deploy:
    name: Define Infrastructure
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: terraform init -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}"
        working-directory: infra

      - name: Terraform apply
        run: |
          ACCT=${{ needs.build-push.outputs.account_id }}
          SHA=${{ needs.build-push.outputs.image_tag }}
          terraform apply -auto-approve \
            -var="ecr_image_uri=${ACCT}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.LAMBDA_REPO }}:${SHA}" \
            -var="sagemaker_image_uri=${ACCT}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.SAGEMAKER_REPO }}:${SHA}" \
            -var="grafana_password=${{ secrets.GRAFANA_PASSWORD }}"
        working-directory: infra
